services:
  redis:
    image: redis:7.4-alpine
    container_name: memory-redis
    restart: unless-stopped
    env_file:
      - redis.env
    command:
      - sh
      - -c
      - redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  redis_data:
