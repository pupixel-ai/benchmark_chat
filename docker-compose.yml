services:
  mysql:
    image: mysql:8.4
    container_name: memory-engineering-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: memory_engineering
      MYSQL_USER: memory_user
      MYSQL_PASSWORD: memory_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
